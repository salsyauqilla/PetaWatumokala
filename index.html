        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        
        /* Opacity Control */
        .opacity-control {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-width: 220px;
        }
        
        .opacity-control label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 13px;
            color: #333;
        }
        
        .opacity-control select {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            background: white;
            cursor: pointer;
        }
        
        .opacity-control input[type="range"] {
            width: 100%;
            height: 6px;
            cursor: pointer;
        }
        
        .opacity-value {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 500;
        }
        
        /* Coordinates Display */
        .coordinates-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 15px 25px;
            border-radius: 6px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            z-index: 1000;
            pointer-events: none;
            min-width: 280px;
            backdrop-filter: blur(4px);
        }
        
        .coordinates-display.hidden {
            display: none;
        }
        
        .coordinates-display .instruction {
            color: #999;
            font-size: 12px;
            font-style: italic;
            margin-bottom: 5px;
        }
        
        .coordinates-display .coords {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }
        
        .coordinates-display .utm-zone {
            font-size: 11px;
            color: #999;
            margin-top: 8px;
        }
        </style>

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;

        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

        function convertToUTM(lat, lon) {
            // Simplified UTM conversion for Zone 51S
            // This is a basic approximation
            var k0 = 0.9996;
            var lon0 = 123; // Central meridian for Zone 51
            var falseEasting = 500000;
            var falseNorthing = 10000000; // Southern hemisphere
            
            var PI = Math.PI;
            var latRad = lat * PI / 180;
            var lonRad = lon * PI / 180;
            var lon0Rad = lon0 * PI / 180;
            
            var n = 1 / (2 * Math.sqrt(298.257223563) / (Math.sqrt(298.257223563) - 1));
            var n2 = n * n;
            var n3 = n2 * n;
            var n5 = n3 * n2;
            
            var c2 = 3/2 * n - 27/32 * n3 + 269/512 * n5;
            var c4 = 21/16 * n2 - 55/32 * n3;
            var c6 = 151/96 * n3;
            
            var A = Math.cos(latRad) * ((lonRad - lon0Rad) % (2 * PI));
            var A2 = A * A;
            var A3 = A2 * A;
            var A4 = A3 * A;
            var A5 = A4 * A;
            var A6 = A5 * A;
            
            var M = Math.sqrt(1 - 0.00669438 * Math.sin(latRad) * Math.sin(latRad));
            var t = Math.tan(latRad) / M;
            var t2 = t * t;
            var t4 = t2 * t2;
            
            var easting = falseEasting + k0 * 6378137 * (A + A3/6 * (1 - t2 + n * Math.cos(latRad) * Math.cos(latRad)) + A5/120 * (1 - 5*t2 + t4 + 10*n*Math.cos(latRad)*Math.cos(latRad) - 4*n*n*Math.cos(latRad)*Math.cos(latRad) - n*Math.sin(latRad)*Math.sin(latRad)));
            
            var northing = falseNorthing + k0 * 6378137 * (Math.atan2(t, Math.cos(A)) - Math.atan2(0, 1) + c2 * A2 + c4 * A4 + c6 * A6);
            
            return {
                easting: Math.round(easting * 100) / 100,
                northing: Math.round(northing * 100) / 100,
                zone: '51S'
            };
        }
